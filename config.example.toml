[telegram]
control_bot_token = "PASTE_CONDUCTOR_BOT_TOKEN"
allowed_chat_ids = [123456789]

[project]
root_env = "CONDUCTOR_PROJECT_ROOT"
max_depth = 2

[channels]
slot_count_env = "CONDUCTOR_CHANNEL_SLOTS"

[defaults]
cli = "claude"
bypass_permissions = true
idle_warning_minutes = 25
idle_timeout_minutes = 30

[remote_control]
auto_enable = true

[session_footer]
enabled = true
template = "cli:{cli} model:{model} cwd:{cwd} ctx:{context_remaining} session:{session_id} limit:{context_limit} data:{data_plane} slot:{bot_slot}"

[trust]
auto_confirm_project_trust = true
trusted_root_only = true

[[bot_slots]]
name = "session-bot-1"
token = "PASTE_BOT_1_TOKEN"

[[bot_slots]]
name = "session-bot-2"
token = "PASTE_BOT_2_TOKEN"

[[bot_slots]]
name = "session-bot-3"
token = "PASTE_BOT_3_TOKEN"

[[bot_slots]]
name = "session-bot-4"
token = "PASTE_BOT_4_TOKEN"
